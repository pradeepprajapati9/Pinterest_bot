name: Deal Bot (Telegram + Pinterest)

on:
  schedule:
    - cron: "30 4 * * *"    # 10:00 IST
    - cron: "30 9 * * *"    # 15:00 IST
    - cron: "30 14 * * *"   # 20:00 IST  (evening - peak shopping)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: deal-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Refresh live deals
        continue-on-error: true   # if Amazon blocks the runner, just post existing deals
        run: python fetch_deals.py
      - name: Post a deal
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          AMAZON_ASSOC_TAG: ${{ secrets.AMAZON_ASSOC_TAG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DO_POST: "true"
        run: python main.py
      # Pinterest denied API access to this app, so we can't publish pins directly.
      # Instead build the CSV their no-approval "Bulk create Pins" tool accepts,
      # and commit it — download pins.csv from the repo and upload it now and then.
      - name: Build Pinterest bulk-upload CSV
        continue-on-error: true
        env:
          PINTEREST_BOARD_NAME: ${{ secrets.PINTEREST_BOARD_NAME }}
          AMAZON_ASSOC_TAG: ${{ secrets.AMAZON_ASSOC_TAG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python make_pins_csv.py --limit 10
      - name: Persist deal state + pins.csv
        if: always()
        run: |
          git config user.name "deal-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add deals.json pins.csv || true
          git commit -m "chore: update deals + pins.csv [skip ci]" || echo "no change"
          git push || echo "nothing to push"
